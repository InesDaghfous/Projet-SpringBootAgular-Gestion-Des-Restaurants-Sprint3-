<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
<meta charset="utf-8">
<title>Liste des Restaurant</title>
</head>
<body>
   <div th:replace="template"></div>
<div class="container">
<div class="card">
  <div class="card-header">
    Liste des Restaurants
  </div>
  <div class="card-body">    
      <table class="table table-striped">
        <tr>
          <th>ID</th><th>Nom Restaurant</th><th>Note</th><th>Date</th><th>Specialite</th>
         </tr>  
           <tr th:each="p : ${restaurants.content}">
              <td th:text="${p.idRestaurant}"></td>
              <td th:text="${p.nomRestaurant}"></td>
              <td th:text="${p.noteRestaurant}"></td>   
              <td th:text="${p.dateOuverture}"></td>  
              
               <td th:if= "${!#strings.isEmpty(p.specialite)}" th:text="${p.specialite.nomSpec}"></td>
 			   <td th:if= "${#strings.isEmpty(p.specialite)}" th:text="${'Pas de Specialite'}"></td> 
              
               
             
              <td  sec:authorize="hasAuthority('ADMIN')" ><a class="btn btn-success" th:href="@{modifierRestaurant(id=${p.idRestaurant}, page=${currentPage},size=${size})}">Editer</a></td>
              <td sec:authorize="hasAuthority('ADMIN')" ><a class="btn btn-danger" onclick="return confirm('Etes-vous sûr ?')"
                th:href="@{supprimerRestaurant(id=${p.idRestaurant}, page=${currentPage},size=${size})}">Supprimer</a></td> 
           </tr>             
      </table>
            <ul class="nav nav-pills">
         <li th:each="page,status:${pages}">
           <a th:class="${status.index==currentPage?'btn btn-primary':'btn'  }" 
       th:href="@{ ListeRestaurants(page=${status.index}, size=${size} ) }"
              th:text="${status.index }"></a>
         </li>
      </ul>
      </div>
</div>
</div>
</body>
</html>
