<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">     
<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
<head>
<meta charset="utf-8">
<title>Ajout des Restaurants</title>
</head>
<body>
   <div th:replace="template"></div>
<div class="container mt-5">
<div class="card">
  <div class="card-header" th:if="${mode=='new'}"> Ajout des Restaurants </div>
  <div class="card-header" th:if="${mode=='edit'}">Modification des Restaurants </div>
  	<div class="card-body">
	<form th:action="@{saveRestaurant}" method="post">
	   
	    <input hidden name="page" class="form-control" th:value="${page}" />
		<input hidden name="size" class="form-control" th:value="${size}" />
	
		<div class="form-group">
			<label class="control-label" hidden>ID Restaurant :</label> 
		       <input type="hidden" name="idRestaurant" class="form-control" th:value="${restaurant.idRestaurant}"  />
		</div>					
		<div class="form-group">
			<label class="control-label">Nom Restaurant :</label> 
			 <input type="text" name="nomRestaurant" class="form-control" th:value="${restaurant.nomRestaurant}"  />
			<span th:errors= ${restaurant.nomRestaurant} class="text-danger"> </span>	 
		</div>
		<div class="form-group">
			<label class="control-label">Note Restaurant :</label> 
		    <input type="text" name="noteRestaurant" class="form-control" th:value="${restaurant.noteRestaurant}" />
		    <span th:errors=${restaurant.noteRestaurant} class="text-danger"> </span> 
		</div>
		<div class="form-group">
			<label class="control-label">date ouverture :</label> 
			<input type="date" name="dateOuverture" class="form-control"  th:value="${restaurant.dateOuverture}"/>
			 <span th:errors=${restaurant.dateOuverture} class="text-danger"> </span> 
		</div>

					<div class="form-group">
						<label class="control-label">Specialite :</label> 
						<select 
							name="specialite" class="form-control"
							th:value="${restaurant.specialite.idSpec}"
							th:if="${!#strings.isEmpty(restaurant.specialite)}">
							<option th:each="c:${specialites}" th:if="${mode=='edit'}"
								th:value="${c.idSpec}" th:text="${c.nomSpec}"
								th:selected="${ c.idSpec==restaurant.specialite.idSpec}">
							</option>
						</select>
						<!-- s'il s'agit d'un ajout (mode==new) ou d'une modification d'un restaurant ayant une catégorie null -->
						<select name="specialite" class="form-control"
							th:if="${#strings.isEmpty(restaurant.specialite)}">
							<option th:each="c:${specialites}" th:value="${c.idSpec}"
								th:text="${c.nomSpec}"></option>
						</select>
					</div>


					<div>
		<button type="submit" class="btn btn-primary">Valider</button>
		</div>
		</form>
		</div>
		</div>
</div>

</body>
</html>
