<div class="container">
  <div>
    <h2>Ajouter un Restaurant :</h2>             
  </div>

  <form> 
         
    <div class="col-sm-2 col-md-2 col-lg-2">
      <label>ID Restaurant</label>
      <input type="text"
             [(ngModel)]="newRestaurant.idRestaurant"
             name="idRestaurant"
             class="form-control">
    </div>
         
    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Nom Restaurant</label>
      <input type="text"
             [(ngModel)]="newRestaurant.nomRestaurant"
             name="nomRestaurant"
             class="form-control">
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Note</label>
      <input type="text"
             [(ngModel)]="newRestaurant.noteRestaurant"
             name="note"
             class="form-control">
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Date ouverture</label>
      <input type="date"
             [(ngModel)]="newRestaurant.dateOuverture"
             name="dateOuverture"
             class="form-control">
    </div>

    <div class="col-sm-4 col-md-4 col-lg-4">
      <label>Spécialité</label>

      <select class="form-control form-control-lg"
              id="idSpec"
              name="idSpec"
              [(ngModel)]="newIdSpec">

        @for(spec of specialites; track spec.idSpec){
          <option [ngValue]="spec.idSpec">
            {{spec.nomSpec}}
          </option>
        }

      </select>
    </div>
         
    <div class="mt-2">
      <button type="button"
              (click)="addRestaurant()"
              class="btn btn-success">
        Ajouter
      </button>
    </div>   

  </form>
</div>
