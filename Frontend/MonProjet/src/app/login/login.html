<div class="container mt-5">
  <div class="row justify-content-md-center">
    <div class="col-md-4">

      @if(erreur == 1) {
      <div class="alert alert-danger">
        <strong>{{message}}</strong>
      </div>
      }

      <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
          <h4 class="mb-0">Connexion</h4>
        </div>
        <div class="card-body">
          <form>
            <div class="form-group mb-3">
              <label class="form-label fw-bold">Nom Utilisateur :</label>
              <input type="text" name="username" class="form-control" [(ngModel)]="user.username"
                placeholder="Entrez votre nom d'utilisateur">
            </div>
            <div class="form-group mb-3">
              <label class="form-label fw-bold">Mot de passe :</label>
              <input type="password" name="password" [(ngModel)]="user.password" class="form-control"
                placeholder="Entrez votre mot de passe">
            </div>
            <div class="row justify-content-md-center">
              <button type="button" (click)="onLoggedin()" class="btn btn-lg btn-primary mt-3">
                Connexion
              </button>
            </div>
            <div class="mt-3 text-center">
              <p>Vous n'avez pas un compte? <a routerLink="/register" mb-4 >S'inscrire </a></p>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
