<div class="card shadow">
  <div class="card-header bg-success text-white">
    <h5 class="mb-0">{{ ajout ? 'Ajouter une Spécialité' : 'Modifier la Spécialité' }}</h5>
  </div>
  <div class="card-body">
    <form>

     
      <div [hidden]="ajout" class="mb-3">
        <label class="form-label fw-bold">ID Spécialité</label>
        <input
          type="text"
          [(ngModel)]="specialite.idSpec"
          name="idSpecialite"
          class="form-control w-50"
          readonly>
      </div>

    
      <div class="mb-3">
        <label class="form-label fw-bold">Nom Spécialité</label>
        <input
          type="text"
          [(ngModel)]="specialite.nomSpec"
          name="nomSpecialite"
          class="form-control"
          placeholder="Entrez un nom de spécialité...">
      </div>

     
      <div class="d-flex gap-2">
        <button
          type="submit"
          [disabled]="!specialite.nomSpec"
          class="btn btn-success"
          (click)="saveSpecialite()">
          {{ ajout ? 'Ajouter' : 'Modifier' }}
        </button>
      </div>

    </form>
  </div>
</div>
